AWSTemplateFormatVersion: "2010-09-09"
Description: "Module: Secrets - Secrets Manager per app. One per (TenantId, Environment, AppId)."

Parameters:
  TenantId:
    Type: String
    Description: Tenant identifier (base, abc, xyz, ...)
  Environment:
    Type: String
    AllowedValues: [staging, prod]
    Description: Environment (staging or prod)
  AppId:
    Type: String
    Description: Application ID (foo, baz)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names

Resources:
  AppSecretPlaceholder:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-app-secret"
      Description: !Sub "App secrets (DB credentials, env vars, etc.) for ${AppId} in ${TenantId}/${Environment}"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "dbadmin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  AppSecretArn:
    Description: ARN of app secret
    Value: !Ref AppSecretPlaceholder
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-AppSecretArn"
