AWSTemplateFormatVersion: "2010-09-09"
Description: "Module: ECR - One repository per app, shared by all tenants. Use image tags for environment (e.g. staging, production)."

Parameters:
  AppId:
    Type: String
    Description: Application ID (foo, baz)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names

Resources:
  EcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${StackPrefix}-${AppId}"
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images","selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},"action":{"type":"expire"}}]}
      Tags:
        - Key: AppId
          Value: !Ref AppId
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  EcrRepoUri:
    Description: ECR repository URI (shared by all tenants for this app; use image tags for environment)
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/${StackPrefix}-${AppId}"
