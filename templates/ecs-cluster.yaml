AWSTemplateFormatVersion: "2010-09-09"
Description: "Module: ECS cluster - one per (TenantId, Environment). Shared by foo and baz."

Parameters:
  TenantId:
    Type: String
    Description: Tenant identifier (base, abc, xyz, ...)
  Environment:
    Type: String
    AllowedValues: [staging, prod]
    Description: Environment (staging or prod)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${StackPrefix}-${TenantId}-${Environment}-cluster"
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  ClusterName:
    Description: ECS cluster name
    Value: !Ref Cluster
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-ClusterName"
  ClusterArn:
    Description: ECS cluster ARN
    Value: !GetAtt Cluster.Arn
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-ClusterArn"
