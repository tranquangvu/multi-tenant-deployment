AWSTemplateFormatVersion: "2010-09-09"
Description: "Module: ECS service - Fargate service and task definition per app. One per (TenantId, Environment, AppId)."

Parameters:
  TenantId:
    Type: String
    Description: Tenant identifier (base, abc, xyz, ...)
  Environment:
    Type: String
    AllowedValues: [stage, prod]
    Description: Environment (stage or prod)
  AppId:
    Type: String
    Description: Application ID (foo, baz)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names
  EcrRepoUri:
    Type: String
    Description: ECR repository URI (from ecr module output). Image will use :latest.
  TargetGroupArn:
    Type: String
    Default: ""
    Description: "(Optional) ALB target group ARN to attach this service to. Leave empty for no ALB."
  AppSecretArn:
    Type: String
    Description: ARN of the app secret (from secrets module for this app). Used to inject DATABASE_URL and other env vars.
  AppCpu:
    Type: String
    Default: "256"
    Description: CPU units for Fargate task
  AppMemory:
    Type: String
    Default: "512"
    Description: Memory (MB) for Fargate task
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: Desired number of tasks

Conditions:
  HasTargetGroup: !Not [!Equals [!Ref TargetGroupArn, ""]]

Resources:
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${StackPrefix}-${TenantId}-${Environment}-${AppId}"
      RetentionInDays: 30
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref AppCpu
      Memory: !Ref AppMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: !Ref AppId
          Image: !Sub "${EcrRepoUri}:latest"
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          HealthCheck:
            Command: ["CMD-SHELL", "echo ok || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 2
            StartPeriod: 60
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Sub "${AppSecretArn}:DATABASE_URL::"

  Service:
    Type: AWS::ECS::Service
    DependsOn: TaskDefinition
    Properties:
      ServiceName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-svc"
      Cluster: !ImportValue
        Fn::Sub: "${StackPrefix}-${TenantId}-${Environment}-ClusterName"
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !ImportValue
              Fn::Sub: "${StackPrefix}-${TenantId}-${Environment}-PrivateSubnet1Id"
            - !ImportValue
              Fn::Sub: "${StackPrefix}-${TenantId}-${Environment}-PrivateSubnet2Id"
          SecurityGroups:
            - !ImportValue
              Fn::Sub: "${StackPrefix}-${TenantId}-${Environment}-AppSecurityGroupId"
      LoadBalancers: !If
        - HasTargetGroup
        - - TargetGroupArn: !Ref TargetGroupArn
            ContainerName: !Ref AppId
            ContainerPort: 8080
        - !Ref "AWS::NoValue"

Outputs:
  ServiceName:
    Description: ECS service name
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-ServiceName"
  LogGroupName:
    Description: CloudWatch log group for app
    Value: !Ref LogGroup
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-LogGroupName"
