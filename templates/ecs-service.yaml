AWSTemplateFormatVersion: "2010-09-09"
Description: "Module: ECS service - Fargate service and task definition per app. One per (TenantId, Environment, AppId)."

Parameters:
  TenantId:
    Type: String
    Description: Tenant identifier (base, abc, xyz, ...)
  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Environment (staging or production)
  AppSecretArn:
    Type: String
    Description: ARN of the app secret (from secrets module). Used for DATABASE_USER and DATABASE_PASSWORD only.
  AppId:
    Type: String
    Description: Application ID (foo, baz)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names
  ImageUri:
    Type: String
    Description: Container image reference (for example, repo/image:tag). If no tag is provided, runtime defaults to latest.
  TargetGroupArn:
    Type: String
    Default: ""
    Description: "(Optional) ALB target group ARN to attach this service to. Leave empty for no ALB."
  DbEndpoint:
    Type: String
    Default: ""
    Description: RDS endpoint hostname (from RDS module output DbEndpoint). Used to build DATABASE_* env vars.
  DbPort:
    Type: String
    Default: ""
    Description: RDS port (from RDS module output DbPort).
  DbName:
    Type: String
    Default: ""
    Description: RDS database name (from RDS module output DbName).
  TaskCpu:
    Type: String
    Default: "256"
    Description: CPU units for Fargate task
  TaskMemory:
    Type: String
    Default: "512"
    Description: Memory (MB) for Fargate task
  DesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    MaxValue: 10
    Description: Desired number of tasks
  ClusterName:
    Type: String
    Description: ECS cluster name (from ecs-cluster nested stack)
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  AppSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id

Conditions:
  HasTargetGroup: !Not [!Equals [!Ref TargetGroupArn, ""]]

Resources:
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-exec-secrets-read"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                Resource: !Ref AppSecretArn
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId

  TaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${StackPrefix}-${TenantId}-${Environment}-${AppId}"
      RetentionInDays: 30
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: AppId
          Value: !Ref AppId

  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: !Ref TaskCpu
      Memory: !Ref TaskMemory
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !GetAtt TaskRole.Arn
      ContainerDefinitions:
        - Name: !Ref AppId
          Image: !Ref ImageUri
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: !Ref AppId
          PortMappings:
            - ContainerPort: 8080
              Protocol: tcp
          HealthCheck:
            Command: ["CMD-SHELL", "echo ok || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 2
            StartPeriod: 60
          # RDS connection from stack outputs; app can build DATABASE_URL as postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE_NAME}
          Environment:
            - Name: PORT
              Value: 8080
            - Name: DATABASE_HOST
              Value: !Ref DbEndpoint
            - Name: DATABASE_PORT
              Value: !Ref DbPort
            - Name: DATABASE_NAME
              Value: !Ref DbName
          Secrets:
            - Name: DATABASE_USER
              ValueFrom: !Sub "${AppSecretArn}:username::"
            - Name: DATABASE_PASSWORD
              ValueFrom: !Sub "${AppSecretArn}:password::"

  Service:
    Type: AWS::ECS::Service
    DependsOn: TaskDefinition
    Properties:
      ServiceName: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-svc"
      Cluster: !Ref ClusterName
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: !Ref DesiredCount
      LaunchType: FARGATE
      PlatformVersion: LATEST
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1Id
            - !Ref PrivateSubnet2Id
          SecurityGroups:
            - !Ref AppSecurityGroupId
      LoadBalancers: !If
        - HasTargetGroup
        - - TargetGroupArn: !Ref TargetGroupArn
            ContainerName: !Ref AppId
            ContainerPort: 8080
        - !Ref "AWS::NoValue"

Outputs:
  ServiceName:
    Description: ECS service name
    Value: !GetAtt Service.Name
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-ServiceName"
  LogGroupName:
    Description: CloudWatch log group for app
    Value: !Ref LogGroup
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${AppId}-LogGroupName"
