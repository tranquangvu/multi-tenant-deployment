# Bitbucket Pipelines — Infrastructure repo (multi-tenant CloudFormation)
# 1) Upload templates to S3  2) Deploy root stack (main.yaml) per tenant/env.
# Base has stage + prod; other tenants (abc, xyz) have production only.
# OIDC: set AWS_ROLE_ARN in each deployment environment (and repo var for upload-templates).
# Repo variables: TEMPLATES_S3_BUCKET, AWS_ROLE_ARN (for upload-templates).

image: atlassian/default-image:3

definitions:
  steps:
    - step: &upload-templates
        name: Upload templates to S3
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - |
            if [[ -z "${TEMPLATES_S3_BUCKET}" ]]; then
              echo "Set repository variable TEMPLATES_S3_BUCKET"
              exit 1
            fi
            if [[ -z "${AWS_ROLE_ARN}" ]]; then
              echo "Set repository variable AWS_ROLE_ARN for OIDC"
              exit 1
            fi
            export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            export TEMPLATES_S3_PREFIX="${TEMPLATES_S3_PREFIX:-cfn/templates}"
            ./scripts/upload-templates-to-s3.sh

    - step: &deploy-main-base-stage
        name: Deploy Base Stage (root stack)
        deployment: Production
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - export TEMPLATES_S3_BUCKET="${TEMPLATES_S3_BUCKET}"
          - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh base)"
          - export AWS_REGION="$AWS_DEFAULT_REGION"
          - ./scripts/upload-templates-to-s3.sh
          - ./scripts/deploy-stack.sh mt-base-stage-main tenants/base/stage/main.yaml tenants/base/stage/params.json

    - step: &deploy-main-base-prod
        name: Deploy Base Production (root stack)
        deployment: Production
        trigger: manual
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - export TEMPLATES_S3_BUCKET="${TEMPLATES_S3_BUCKET}"
          - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh base)"
          - export AWS_REGION="$AWS_DEFAULT_REGION"
          - ./scripts/upload-templates-to-s3.sh
          - ./scripts/deploy-stack.sh mt-base-prod-main tenants/base/production/main.yaml tenants/base/production/params.json

pipelines:
  branches:
    main:
      - step: *deploy-main-base-stage
      # - step: *deploy-main-base-prod

  custom:
    # Upload CloudFormation templates to S3 only (no deploy)
    upload-templates:
      - step: *upload-templates

    # Deploy root stack for one (tenant, environment). Base: stage or production; others: production only.
    # Set AWS_ROLE_ARN in repo vars or use a deployment env that matches the tenant/env.
    deploy-tenant:
      - variables:
          - name: DEPLOY_TENANT_ID
            default: base
          - name: DEPLOY_ENVIRONMENT
            default: stage
      - step:
          name: Upload templates then deploy $DEPLOY_TENANT_ID / $DEPLOY_ENVIRONMENT
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - export TEMPLATES_S3_BUCKET="${TEMPLATES_S3_BUCKET}"
            - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh $DEPLOY_TENANT_ID)"
            - export AWS_REGION="$AWS_DEFAULT_REGION"
            - ./scripts/upload-templates-to-s3.sh
            - |
              ENV_NAME="$DEPLOY_ENVIRONMENT"
              [[ "$ENV_NAME" == "prod" ]] && ENV_NAME="production"
              CFN_ENV="stage"; [[ "$ENV_NAME" == "production" ]] && CFN_ENV="prod"
              ./scripts/deploy-stack.sh "mt-${DEPLOY_TENANT_ID}-${CFN_ENV}-main" "tenants/${DEPLOY_TENANT_ID}/${ENV_NAME}/main.yaml" "tenants/${DEPLOY_TENANT_ID}/${ENV_NAME}/params.json"

    # Promote to multiple tenants (production only for abc/xyz)
    # Set AWS_ROLE_ARN (e.g. a role that can assume per-tenant roles, or one role per tenant via deployment).
    promote-tenants:
      - variables:
          - name: PROMOTE_TENANTS
            default: ""
      - step:
          name: Upload templates then promote to tenants
          trigger: manual
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - export TEMPLATES_S3_BUCKET="${TEMPLATES_S3_BUCKET}"
            - ./scripts/upload-templates-to-s3.sh
            - |
              if [[ -z "$PROMOTE_TENANTS" ]]; then
                echo "Set PROMOTE_TENANTS (e.g. abc,xyz or 'all')"
                exit 1
              fi
              [[ "$PROMOTE_TENANTS" == "all" ]] && PROMOTE_TENANTS="abc,xyz"
              IFS=',' read -ra TARR <<< "$PROMOTE_TENANTS"
              for t in "${TARR[@]}"; do
                echo "Deploying $t production..."
                export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh "$t")"
                export AWS_REGION="$AWS_DEFAULT_REGION"
                ./scripts/deploy-stack.sh "mt-${t}-prod-main" "tenants/${t}/production/main.yaml" "tenants/${t}/production/params.json" || { echo "Failed $t"; exit 1; }
              done
              echo "Promotion complete."
