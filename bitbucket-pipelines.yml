# Bitbucket Pipelines — Infrastructure repo (multi-tenant CloudFormation)
# 1) Upload templates to S3  2) Deploy root stack (main.yaml) per tenant/env.
# Base has staging + production; other tenants (abc, xyz) have production only.
# OIDC: set AWS_ROLE_ARN in each deployment environment (and repo var for upload-config-templates).
# Repo variables: INFRA_S3_BUCKET, TEMPLATE_S3_PREFIX, CONFIG_S3_PREFIX, AWS_ROLE_ARN (for upload-config-templates).

image: amazon/aws-cli:latest

definitions:
  steps:
    - step: &oidc-verify
        name: Verify OIDC Token
        oidc: true
        script:
          - |
            if [[ -n "${BITBUCKET_STEP_OIDC_TOKEN:-}" ]]; then
              echo "OIDC token provided"
            else
              echo "OIDC token is missing"
              exit 1
            fi
    - step: &upload-config-templates
        name: Upload Config & Templates To S3
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - ./scripts/upload-config-templates.sh

    - step: &deploy-base-staging
        name: Deploy Base Staging
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh base)"
          - export AWS_REGION="$AWS_DEFAULT_REGION"
          - ./scripts/deploy-shared.sh
          - ./scripts/deploy-stack.sh mt-base-staging tenants/base/staging/main.yaml tenants/base/staging/params.json

    - step: &validate-base-staging
        name: Validate Base Staging succeeded
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh base)"
          - export AWS_REGION="$AWS_DEFAULT_REGION"
          - ./scripts/validate-stack-success.sh mt-base-staging

pipelines:
  branches:
    main:
      - step: *oidc-verify
      # - step: *upload-config-templates
      # - step: *deploy-base-staging
      # - step:
      #     name: Approve Production Deployment
      #     trigger: manual
      #     script:
      #       - echo "Approved, continue to production"

  custom:
    # Deploy root stack for one (tenant, environment). Base: staging or production; others: production only.
    # Set AWS_ROLE_ARN in repo vars or use a deployment env that matches the tenant/env.
    deploy-tenant:
      - variables:
          - name: DEPLOY_TENANT_ID
            default: base
          - name: DEPLOY_ENVIRONMENT
            default: staging
      - step:
          name: Upload templates then deploy $DEPLOY_TENANT_ID / $DEPLOY_ENVIRONMENT
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh $DEPLOY_TENANT_ID)"
            - export AWS_REGION="$AWS_DEFAULT_REGION"
            - ./scripts/deploy-shared.sh
            - |
              ENV_NAME="$DEPLOY_ENVIRONMENT"
              [[ "$ENV_NAME" == "production" ]] && ENV_NAME="production"
              CFN_ENV="staging"; [[ "$ENV_NAME" == "production" ]] && CFN_ENV="production"
              ./scripts/deploy-stack.sh "mt-${DEPLOY_TENANT_ID}-${CFN_ENV}" "tenants/${DEPLOY_TENANT_ID}/${ENV_NAME}/main.yaml" "tenants/${DEPLOY_TENANT_ID}/${ENV_NAME}/params.json"

    # Update ECS task definition with new image tag and deploy (triggered by app repo or run manually).
    # Variables: IMAGE_TAG (required), TARGET_TENANTS (required), DEPLOY_ENV (required), APP_ID (required).
    deploy-ecs-svc:
      - variables:
          - name: IMAGE_TAG
            default: ""
          - name: TARGET_TENANTS
            default: ""
          - name: DEPLOY_ENV
            default: ""
          - name: APP_ID
            default: ""
      - step:
          name: Update ECS image and deploy
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - |
              [[ -n "${IMAGE_TAG:-}" ]] || { echo "IMAGE_TAG is required"; exit 1; }
              [[ -n "${TARGET_TENANTS:-}" ]] || { echo "TARGET_TENANTS is required"; exit 1; }
              [[ -n "${DEPLOY_ENV:-}" ]] || { echo "DEPLOY_ENV is required"; exit 1; }
              [[ -n "${APP_ID:-}" ]] || { echo "APP_ID is required"; exit 1; }
              export IMAGE_TAG TARGET_TENANTS DEPLOY_ENV APP_ID
              ./scripts/deploy-ecs-svc.sh.sh

    # Promote to multiple tenants (production only for abc/xyz)
    # Set AWS_ROLE_ARN (e.g. a role that can assume per-tenant roles, or one role per tenant via deployment).
    deploy-tenants-production:
      - variables:
          - name: TARGET_TENANTS
            default: ""
      - step:
          name: Deploy Production for $TARGET_TENANTS
          trigger: manual
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - |
              if [[ -z "$TARGET_TENANTS" ]]; then
                echo "Set TARGET_TENANTS (e.g. abc,xyz or 'all')"
                exit 1
              fi
              [[ "$TARGET_TENANTS" == "all" ]] && TARGET_TENANTS="abc,xyz"
              IFS=',' read -ra TARR <<< "$TARGET_TENANTS"
              for t in "${TARR[@]}"; do
                echo "Deploying $t production..."
                export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh "$t")"
                export AWS_REGION="$AWS_DEFAULT_REGION"
                ./scripts/deploy-shared.sh
                ./scripts/deploy-stack.sh "mt-${t}-production" "tenants/${t}/production/main.yaml" "tenants/${t}/production/params.json" || { echo "Failed $t"; exit 1; }
              done
              echo "Promotion complete."
