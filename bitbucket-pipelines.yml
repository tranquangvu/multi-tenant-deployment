# Bitbucket Pipelines — Infrastructure repo (multi-tenant CloudFormation)
# 1) Upload templates to S3  2) Deploy root stack (main.yaml) per tenant/env.
# Base has staging + production; other tenants (abc, xyz) have production only.
# OIDC: AWS_ROLE_ARN is resolved dynamically from config/tenant-registry.yaml
# using accountId + bitbucketOidcRoleName for the target tenant/environment.
# Repo variables: INFRA_S3_BUCKET, TEMPLATE_S3_PREFIX, CONFIG_S3_PREFIX.

image: amazon/aws-cli:latest

definitions:
  steps:
    - step: &oidc-verify
        name: Verify OIDC Token
        oidc: true
        script:
          - |
            if [[ -n "${BITBUCKET_STEP_OIDC_TOKEN:-}" ]]; then
              echo "OIDC token provided"
            else
              echo "OIDC token is missing"
              exit 1
            fi
    - step: &upload-config-templates
        name: Upload Config & Templates To S3
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - ./scripts/install-ci-deps.sh
          - export AWS_ROLE_ARN="$(./scripts/get-shared-oidc-role-arn.sh)"
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - export AWS_DEFAULT_REGION="$(./scripts/get-shared-region.sh)"
          - export AWS_REGION="$AWS_DEFAULT_REGION"
          - ./scripts/upload-config-templates.sh

    - step: &deploy-base-production
        name: Deploy Base Production
        oidc: true
        script:
          - chmod +x ./scripts/*.sh
          - ./scripts/install-ci-deps.sh
          - export AWS_ROLE_ARN="$(./scripts/get-tenant-oidc-role-arn.sh base production)"
          - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
          - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
          - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh base)"
          - export AWS_REGION="$AWS_DEFAULT_REGION"
          - ./scripts/deploy-shared.sh
          - ./scripts/deploy-tenant.sh base production

pipelines:
  branches:
    main:
      - step: *oidc-verify
      - step: *upload-config-templates
      - step: *deploy-base-production
      - step:
          name: Approve Production Deployment
          trigger: manual
          script:
            - echo "Approved, continue to production"

  custom:
    # Deploy root stack for one tenant.
    # - If DEPLOY_ENVIRONMENT is provided: deploy that environment for the tenant.
    # - If DEPLOY_ENVIRONMENT is empty/omitted: deploy all environments for the tenant from tenant-registry.yaml.
    # AWS_ROLE_ARN is resolved dynamically from tenant-registry accountId + bitbucketOidcRoleName.
    deploy-tenant:
      - variables:
          - name: DEPLOY_TENANT_ID
            default: base
          - name: DEPLOY_ENVIRONMENT
            default: ""
      - step:
          name: Deploy tenant
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - ./scripts/install-ci-deps.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh $DEPLOY_TENANT_ID)"
            - export AWS_REGION="$AWS_DEFAULT_REGION"
            - |
              if [[ -n "${DEPLOY_ENVIRONMENT:-}" ]]; then
                export AWS_ROLE_ARN="$(./scripts/get-tenant-oidc-role-arn.sh "$DEPLOY_TENANT_ID" "$DEPLOY_ENVIRONMENT")"
                ./scripts/deploy-shared.sh
                ./scripts/deploy-tenant.sh "$DEPLOY_TENANT_ID" "$DEPLOY_ENVIRONMENT"
              else
                ENVS="$(./scripts/get-tenant-envs.sh "$DEPLOY_TENANT_ID")"
                for env in $ENVS; do
                  export AWS_ROLE_ARN="$(./scripts/get-tenant-oidc-role-arn.sh "$DEPLOY_TENANT_ID" "$env")"
                  ./scripts/deploy-shared.sh
                  ./scripts/deploy-tenant.sh "$DEPLOY_TENANT_ID" "$env"
                done
              fi

    # Delete root stack for one tenant.
    # - If DELETE_ENVIRONMENT is provided: delete that environment for the tenant.
    # - If DELETE_ENVIRONMENT is empty/omitted: delete all environments for the tenant from tenant-registry.yaml.
    # Safety: must set CONFIRM_DELETE_TENANT=1.
    delete-tenant:
      - variables:
          - name: DELETE_TENANT_ID
            default: base
          - name: DELETE_ENVIRONMENT
            default: ""
          - name: CONFIRM_DELETE_TENANT
            default: "0"
      - step:
          name: Delete tenant
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - ./scripts/install-ci-deps.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh $DELETE_TENANT_ID)"
            - export AWS_REGION="$AWS_DEFAULT_REGION"
            - |
              if [[ -n "${DELETE_ENVIRONMENT:-}" ]]; then
                export AWS_ROLE_ARN="$(./scripts/get-tenant-oidc-role-arn.sh "$DELETE_TENANT_ID" "$DELETE_ENVIRONMENT")"
                CONFIRM_DELETE_TENANT="$CONFIRM_DELETE_TENANT" ./scripts/delete-tenant.sh "$DELETE_TENANT_ID" "$DELETE_ENVIRONMENT"
              else
                ENVS="$(./scripts/get-tenant-envs.sh "$DELETE_TENANT_ID")"
                for env in $ENVS; do
                  export AWS_ROLE_ARN="$(./scripts/get-tenant-oidc-role-arn.sh "$DELETE_TENANT_ID" "$env")"
                  CONFIRM_DELETE_TENANT="$CONFIRM_DELETE_TENANT" ./scripts/delete-tenant.sh "$DELETE_TENANT_ID" "$env"
                done
              fi

    # Promote to multiple tenants (production only for abc/xyz)
    # AWS_ROLE_ARN is resolved dynamically from tenant-registry accountId + bitbucketOidcRoleName.
    deploy-tenants-production:
      - variables:
          - name: TARGET_TENANTS
            default: ""
      - step:
          name: Deploy Production for $TARGET_TENANTS
          trigger: manual
          oidc: true
          script:
            - chmod +x ./scripts/*.sh
            - ./scripts/install-ci-deps.sh
            - export AWS_WEB_IDENTITY_TOKEN_FILE="$(pwd)/web-identity-token"
            - echo "$BITBUCKET_STEP_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
            - |
              if [[ -z "$TARGET_TENANTS" ]]; then
                echo "Set TARGET_TENANTS (e.g. abc,xyz or 'all')"
                exit 1
              fi
              [[ "$TARGET_TENANTS" == "all" ]] && TARGET_TENANTS="abc,xyz"
              IFS=',' read -ra TARR <<< "$TARGET_TENANTS"
              for t in "${TARR[@]}"; do
                echo "Deploying $t production..."
                export AWS_ROLE_ARN="$(./scripts/get-tenant-oidc-role-arn.sh "$t" production)"
                export AWS_DEFAULT_REGION="$(./scripts/get-tenant-region.sh "$t")"
                export AWS_REGION="$AWS_DEFAULT_REGION"
                ./scripts/deploy-shared.sh
                ./scripts/deploy-tenant.sh "$t" production || { echo "Failed $t"; exit 1; }
              done
              echo "Promotion complete."
