# Copy this file to the root of your APPLICATION repo (app1 or app2) as bitbucket-pipelines.yml
# Flow: Build -> Deploy to Base (stage/prod) -> Validate -> Manual Approval -> Promote to Tenants
# Base has stage + prod; other tenants (abc, xyz) have prod only.

image: atlassian/default-image:3

definitions:
  services:
    docker:
      memory: 2048
  steps:
    - step: &build
        name: Build
        size: 2x
        services: [docker]
        script:
          - export APP_ID=${APP_ID:-app1}
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          - export ECR_REGISTRY=${ECR_REGISTRY}
          - export ECR_REPO=${ECR_REPO:-$APP_ID}
          - docker build -t $ECR_REGISTRY/$ECR_REPO:$IMAGE_TAG .
          - pipe: atlassian/aws-ecr-push-image:1.3.1
            variables:
              AWS_ACCESS_KEY_ID: $AWS_ACCESS_KEY_ID
              AWS_SECRET_ACCESS_KEY: $AWS_SECRET_ACCESS_KEY
              AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION
              IMAGE_NAME: $ECR_REGISTRY/$ECR_REPO
              TAGS: $IMAGE_TAG latest
        artifacts:
          - build/**

    - step: &deploy-base-env
        name: Deploy to Base
        deployment: base
        script:
          - export APP_ID=${APP_ID:-app1}
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          - export DEPLOY_ENV=${DEPLOY_ENV:-stage}
          - |
            # Update ECS service to new image (same account; use stack prefix from env)
            PREFIX=${STACK_PREFIX:-mt}
            CLUSTER="${PREFIX}-base-${DEPLOY_ENV}-cluster"
            SVC="${PREFIX}-base-${DEPLOY_ENV}-${APP_ID}-svc"
            aws ecs update-service --cluster "$CLUSTER" --service "$SVC" --force-new-deployment
            aws ecs wait services-stable --cluster "$CLUSTER" --services "$SVC"
          - echo "Base ${DEPLOY_ENV} deployed."

    - step: &validate
        name: Validate Base
        script:
          - export APP_ID=${APP_ID:-app1}
          - export DEPLOY_ENV=${DEPLOY_ENV:-stage}
          - |
            # Health check placeholder — replace with real base URL from SSM or output
            echo "Running health checks for ${APP_ID} in base-${DEPLOY_ENV}..."
            # curl -sf "${BASE_APP_URL}/health" || true
            echo "Validation passed (implement curl to your /health endpoint)."

    - step: &promote
        name: Promote to Tenants
        trigger: manual
        script:
          - export APP_ID=${APP_ID:-app1}
          - export IMAGE_TAG=${BITBUCKET_COMMIT:0:7}
          - |
            PROMOTE_TENANTS="${PROMOTE_TENANTS:-}"
            PROMOTE_ENVS="${PROMOTE_ENVS:-prod}"
            if [[ -z "$PROMOTE_TENANTS" ]]; then
              echo "Set pipeline variable PROMOTE_TENANTS (e.g. abc,xyz or 'all')"
              exit 1
            fi
            [[ "$PROMOTE_TENANTS" == "all" ]] && PROMOTE_TENANTS="abc,xyz"
            PREFIX=${STACK_PREFIX:-mt}
            IFS=',' read -ra TARR <<< "$PROMOTE_TENANTS"
            IFS=',' read -ra EARR <<< "$PROMOTE_ENVS"
            for t in "${TARR[@]}"; do
              for e in "${EARR[@]}"; do
                echo "Promoting ${APP_ID} to $t $e..."
                aws ecs update-service --cluster "${PREFIX}-${t}-${e}-cluster" --service "${PREFIX}-${t}-${e}-${APP_ID}-svc" --force-new-deployment
                aws ecs wait services-stable --cluster "${PREFIX}-${t}-${e}-cluster" --services "${PREFIX}-${t}-${e}-${APP_ID}-svc" || true
              done
            done
            echo "Promotion complete."

pipelines:
  branches:
    main:
      - step: *build
      - step:
          <<: *deploy-base-env
          name: Deploy to Base Stage
          deployment: base-stage
          variables:
            DEPLOY_ENV: stage
      - step: *validate
      - step:
          name: Approval for promotion
          trigger: manual
          script:
            - echo "Approve to run Promote to Tenants step."
      - step: *promote

  custom:
    build-only:
      - step: *build
    deploy-base:
      - variables:
          - name: DEPLOY_ENV
            default: stage
      - step: *build
      - step: *deploy-base-env
    promote:
      - variables:
          - name: PROMOTE_TENANTS
            default: ""
          - name: PROMOTE_ENVS
            default: "prod"
      - step: *promote
