# Tenant registry — base has staging + production; other tenants have production only.
# Used for documentation today; later for pipelines to resolve target account and role per (tenant, env).
#
# When using AWS Landing Zone / multi-account:
#   - accounts: one AWS account per (tenant, environment). Pipeline uses this to assume role and deploy.
#   - deployment_role_arn: role to assume in target account (e.g. Landing Zone deployment role).
#   - region: deployment region for this tenant (can override per-environment if needed).

tenants:
  base:
    id: base
    name: Base
    region: ap-southeast-1
    environments:
      staging:
        accountId: '862344888019'
        accountName: 'Sanbox'
        networkVpcName: 'Sanbox-VPC'
        networkPublicSubnetNames: ['PrivateTestA', 'Sanbox-Subnet-2']
        networkPrivateSubnetNames: ['PublicInboundA', 'PublicInboundB']
      production:
        accountId: '862344888019'
        accountName: 'Sanbox'
        networkVpcName: 'Sanbox-VPC'
        networkPublicSubnetNames: ['PrivateTestA', 'Sanbox-Subnet-2']
        networkPrivateSubnetNames: ['PublicInboundA', 'PublicInboundB']

