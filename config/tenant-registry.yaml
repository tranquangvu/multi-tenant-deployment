# Tenant registry — base has staging + production; other tenants have production only.
#
# Used by scripts/deploy-tenant.sh to:
#   - resolve region and environment list
#   - verify AWS account (accountId vs sts get-caller-identity), unless SKIP_TENANT_ACCOUNT_CHECK=1
#   - build SSM parameter names for VPC and subnets (Landing Zone / shared network)
#
# SSM path pattern (default root: /accelerator/network):
#   VPC id:     {ssmNetworkPrefix}/vpc/{networkVpcName}/id
#   Subnet id:  {ssmNetworkPrefix}/vpc/{networkVpcName}/subnet/{subnetName}/id
#
# Override the root path with either:
#   - env var SSM_NETWORK_PREFIX (e.g. /network for paths like /network/vpc/.../id), or
#   - optional key ssmNetworkPrefix under the tenant (same string as SSM_NETWORK_PREFIX).
#
# CloudFormation resolves these at deploy time on the root stack
# (AWS::SSM::Parameter::Value<...>). The IAM principal running aws cloudformation deploy
# must have ssm:GetParameter on those parameter ARNs.

tenants:
  base:
    id: base
    name: Base
    region: ap-southeast-1
    environments:
      staging:
        accountId: '091457645177'
        accountName: 'GoldenOwl'
        networkVpcName: 'Sanbox-VPC'
        networkPrivateSubnetNames: ['PrivateAppA', 'PrivateAppB']
        networkPublicSubnetNames: ['PublicInboundA', 'PublicInboundB']
        bitbucketOidcRoleName: 'bitbucket-oidc-role'
      production:
        accountId: '091457645177'
        accountName: 'GoldenOwl'
        networkVpcName: 'Sanbox-VPC'
        networkPrivateSubnetNames: ['PrivateAppA', 'PrivateAppB']
        networkPublicSubnetNames: ['PublicInboundA', 'PublicInboundB']
        bitbucketOidcRoleName: 'bitbucket-oidc-role'

  abc:
    id: abc
    name: ABC
    region: ap-southeast-1
    environments:
      production:
        accountId: '091457645177'
        accountName: 'GoldenOwl'
        networkVpcName: 'ABC'
        networkPrivateSubnetNames: ['PrivateAppA', 'PrivateAppB']
        networkPublicSubnetNames: ['PublicInboundA', 'PublicInboundB']
        bitbucketOidcRoleName: 'bitbucket-oidc-role'

  xyz:
    id: xyz
    name: XYZ
    region: ap-southeast-1
    environments:
      production:
        accountId: '091457645177'
        accountName: 'GoldenOwl'
        networkVpcName: 'XYZ'
        networkPrivateSubnetNames: ['PrivateAppA', 'PrivateAppB']
        networkPublicSubnetNames: ['PublicInboundA', 'PublicInboundB']
        bitbucketOidcRoleName: 'bitbucket-oidc-role'

shared:
  region: ap-southeast-1
  accountId: '091457645177'
  accountName: 'GoldenOwl'
  bitbucketOidcRoleName: 'bitbucket-oidc-role'
