# Tenant registry — base has stage + prod; other tenants have prod only
# Used by pipelines to resolve AWS account, region, and promotion targets
version: "1.0"
updated_at: "2025-03-05"

tenants:
  base:
    id: base
    name: Base
    type: base
    enabled: true
    region: us-east-1
    aws_account_id: "111111111111"
    status: active
    description: First deployment target; validation environment.
    environments: [stage, prod]

  abc:
    id: abc
    name: ABC
    type: silo
    enabled: true
    region: us-east-1
    aws_account_id: "222222222222"
    status: active
    description: Silo tenant ABC.
    environments: [prod]

  xyz:
    id: xyz
    name: XYZ
    type: silo
    enabled: true
    region: us-east-1
    aws_account_id: "333333333333"
    status: active
    description: Silo tenant XYZ.
    environments: [prod]

# Only base has stage + prod; all other tenants have production only.
# Pipeline: deploy to base (stage then prod), then promote to selected tenants (prod only).
