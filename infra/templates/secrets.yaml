AWSTemplateFormatVersion: "2010-09-09"
Description: "Multi-tenant secrets placeholders - Secrets Manager per app. One per (TenantId, Environment). Pipeline or ops populate secret values."

Parameters:
  TenantId:
    Type: String
    Description: Tenant identifier (base, abc, xyz, ...)
  Environment:
    Type: String
    AllowedValues: [stage, prod]
    Description: Environment (stage or prod)
  ApplicationId:
    Type: String
    Description: Application ID (app1, app2)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names

Resources:
  AppSecretPlaceholder:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${ApplicationId}-app-secret"
      Description: !Sub "App config and credentials for ${ApplicationId} in ${TenantId}/${Environment}"
      GenerateSecretString:
        SecretStringTemplate: "{}"
        GenerateStringKey: placeholder
        PasswordLength: 0
        ExcludeCharacters: ""
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: ApplicationId
          Value: !Ref ApplicationId
        - Key: ManagedBy
          Value: CloudFormation

  DbSecretPlaceholder:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${ApplicationId}-db-secret"
      Description: !Sub "DB credentials for ${ApplicationId} in ${TenantId}/${Environment}"
      GenerateSecretString:
        SecretStringTemplate: '{"username": "admin"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: TenantId
          Value: !Ref TenantId
        - Key: Environment
          Value: !Ref Environment
        - Key: ApplicationId
          Value: !Ref ApplicationId
        - Key: ManagedBy
          Value: CloudFormation

Outputs:
  AppSecretArn:
    Description: ARN of app secret
    Value: !Ref AppSecretPlaceholder
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${ApplicationId}-AppSecretArn"
  DbSecretArn:
    Description: ARN of DB secret
    Value: !Ref DbSecretPlaceholder
    Export:
      Name: !Sub "${StackPrefix}-${TenantId}-${Environment}-${ApplicationId}-DbSecretArn"
