AWSTemplateFormatVersion: "2010-09-09"
Description: "Root stack - registers all module stacks via TemplateURL (S3). One per (tenant, environment)."
# Deploy: upload templates to S3, then deploy with params merged for network paths.
# The five *SsmPath parameters are usually omitted from params.json: ./scripts/deploy-tenant.sh
# merges them from config/tenant-registry.yaml (scripts/tenant-network-ssm-params.rb). At deploy,
# each value is the SSM parameter *name* (e.g. /accelerator/network/vpc/MyVpc/id). Parameter types
# AWS::SSM::Parameter::Value<...> tell CloudFormation to resolve that name to the VPC/subnet ID
# at deploy time—no {{resolve:ssm:...}} syntax is required in this template for those inputs.

Parameters:
  TenantId:
    Type: String
    Description: Tenant identifier (base, abc, xyz, ...)
  Environment:
    Type: String
    AllowedValues: [staging, production]
    Description: Environment (staging or production)
  StackPrefix:
    Type: String
    Default: mt
    Description: Prefix for stack and resource names
  TemplateS3Bucket:
    Type: String
    Description: S3 bucket where CloudFormation templates are uploaded
  TemplateS3Prefix:
    Type: String
    Default: templates
    Description: S3 prefix (key prefix) for template files
  VpcIdSsmPath:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::VPC::Id>
    Description: SSM parameter *path* (not the raw VPC id); CloudFormation resolves it at deploy (equivalent to dynamic ref, no {{resolve:ssm}} needed here).
  PublicSubnet1SsmPath:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Description: SSM path for first public subnet id; resolved at deploy.
  PublicSubnet2SsmPath:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Description: SSM path for second public subnet id; resolved at deploy.
  PrivateSubnet1SsmPath:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Description: SSM path for first private subnet id; resolved at deploy.
  PrivateSubnet2SsmPath:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Subnet::Id>
    Description: SSM path for second private subnet id; resolved at deploy.
  BitbucketOidcAudience:
    Type: String
    Default: pip
  BitbucketWorkspace:
    Type: String
    Default: my-workspace
  BitbucketRepo:
    Type: String
    Default: "*"
  FooAppDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: Desired number of tasks for Foo App (set to 0 for initial deploy)
  BazAppDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
    Description: Desired number of tasks for Baz App (set to 0 for initial deploy)

Resources:
  SecurityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/security.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        VpcId: !Ref VpcIdSsmPath
        BitbucketOidcAudience: !Ref BitbucketOidcAudience
        BitbucketWorkspace: !Ref BitbucketWorkspace
        BitbucketRepo: !Ref BitbucketRepo

  SecretsFooAppStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/secrets.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        AppId: foo

  SecretsBazAppStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/secrets.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        AppId: baz

  EcsClusterStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/ecs-cluster.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix

  RdsFooAppStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecretsFooAppStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/rds.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        AppSecretArn: !GetAtt SecretsFooAppStack.Outputs.AppSecretArn
        AppId: foo
        PrivateSubnet1Id: !Ref PrivateSubnet1SsmPath
        PrivateSubnet2Id: !Ref PrivateSubnet2SsmPath

  AlbStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: SecurityStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/alb.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        VpcId: !Ref VpcIdSsmPath
        PublicSubnet1Id: !Ref PublicSubnet1SsmPath
        PublicSubnet2Id: !Ref PublicSubnet2SsmPath

  EcsFooAppStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - AlbStack
      - EcsClusterStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/ecs-service.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        ClusterName: !GetAtt EcsClusterStack.Outputs.ClusterName
        PrivateSubnet1Id: !Ref PrivateSubnet1SsmPath
        PrivateSubnet2Id: !Ref PrivateSubnet2SsmPath
        AppSecurityGroupId: !GetAtt SecurityStack.Outputs.AppSecurityGroupId
        ImageUri: !ImportValue
          Fn::Sub: "${StackPrefix}-foo-EcrRepoUri"
        TargetGroupArn: !GetAtt AlbStack.Outputs.TargetGroupFooArn
        DesiredCount: !Ref FooAppDesiredCount
        DbEndpoint: !GetAtt RdsFooAppStack.Outputs.DbEndpoint
        DbPort: !GetAtt RdsFooAppStack.Outputs.DbPort
        DbName: !GetAtt RdsFooAppStack.Outputs.DbName
        AppSecretArn: !GetAtt SecretsFooAppStack.Outputs.AppSecretArn
        AppId: foo

  EcsBazAppStack:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - AlbStack
      - EcsClusterStack
    Properties:
      TemplateURL: !Sub "https://s3.${AWS::Region}.amazonaws.com/${TemplateS3Bucket}/${TemplateS3Prefix}/ecs-service.yaml"
      Parameters:
        TenantId: !Ref TenantId
        Environment: !Ref Environment
        StackPrefix: !Ref StackPrefix
        ClusterName: !GetAtt EcsClusterStack.Outputs.ClusterName
        PrivateSubnet1Id: !Ref PrivateSubnet1SsmPath
        PrivateSubnet2Id: !Ref PrivateSubnet2SsmPath
        AppSecurityGroupId: !GetAtt SecurityStack.Outputs.AppSecurityGroupId
        ImageUri: !ImportValue
          Fn::Sub: "${StackPrefix}-baz-EcrRepoUri"
        TargetGroupArn: !GetAtt AlbStack.Outputs.TargetGroupBazArn
        DesiredCount: !Ref BazAppDesiredCount
        AppSecretArn: !GetAtt SecretsBazAppStack.Outputs.AppSecretArn
        AppId: baz

Outputs:
  AlbDnsName:
    Value: !GetAtt AlbStack.Outputs.AlbDnsName
    Description: ALB DNS name for this tenant/environment
